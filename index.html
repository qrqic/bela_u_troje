<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#6366f1">
<title>Bela u troje — vođenje rezultata</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- ===== POČETNI EKRAN: unos igrača ===== -->
  <section id="setup-screen" class="screen active">
    <div class="setup-card">
      <h1 class="app-title">🃏 Bela u troje</h1>
      <p class="subtitle">Unesite imena igrača za početak igre</p>
      <form id="setup-form" novalidate>
        <div class="input-group">
          <label for="player1">Igrač 1</label>
          <input type="text" id="player1" maxlength="20" placeholder="Unesite ime" autocomplete="off">
          <span class="error-msg" id="error-player1"></span>
        </div>
        <div class="input-group">
          <label for="player2">Igrač 2</label>
          <input type="text" id="player2" maxlength="20" placeholder="Unesite ime" autocomplete="off">
          <span class="error-msg" id="error-player2"></span>
        </div>
        <div class="input-group">
          <label for="player3">Igrač 3</label>
          <input type="text" id="player3" maxlength="20" placeholder="Unesite ime" autocomplete="off">
          <span class="error-msg" id="error-player3"></span>
        </div>
        <div class="input-group">
          <label>Tko zove prvi?</label>
          <div class="caller-choice" id="setup-caller-choice"></div>
        </div>
        <button type="submit" class="btn btn-primary btn-large">Započni igru</button>
      </form>
    </div>
  </section>

  <!-- ===== GLAVNI EKRAN ===== -->
  <section id="main-screen" class="screen">
    <header class="app-header">
      <button id="theme-toggle" class="icon-btn" type="button" aria-label="Promijeni temu">🌙</button>
      <h1 class="app-title-small">Bela u troje</h1>
      <button id="new-game-btn" class="icon-btn" type="button" aria-label="Nova igra">🔄</button>
    </header>

    <div class="scoreboard" id="scoreboard"></div>

    <div class="round-info" id="round-count">Odigrano rundi: 0</div>
    <div class="next-caller" id="next-caller"></div>

    <div class="action-buttons">
      <button id="new-round-btn" class="btn btn-primary btn-large" type="button">Nova runda</button>
      <div class="secondary-actions">
        <button id="undo-btn" class="btn btn-secondary" type="button" disabled>Poništi</button>
        <button id="edit-last-btn" class="btn btn-secondary" type="button" disabled>Uredi zadnju</button>
        <button id="delete-last-btn" class="btn btn-secondary" type="button" disabled>Obriši zadnju</button>
      </div>
    </div>

    <div class="history-section">
      <h2>Povijest rundi</h2>
      <div id="history-list" class="history-list">
        <p class="empty-state" id="empty-history">Još nema odigranih rundi.</p>
      </div>
    </div>
  </section>

  <!-- ===== MODAL: Nova / uredi rundu ===== -->
  <div id="round-modal" class="modal-overlay">
    <div class="modal-card">
      <div class="modal-header">
        <h2 id="modal-title">Nova runda</h2>
        <button id="close-modal-btn" class="icon-btn" type="button" aria-label="Zatvori">✕</button>
      </div>
      <form id="round-form" novalidate>
        <div class="form-section">
          <h3>Tko zove?</h3>
          <div class="caller-choice" id="caller-choice"></div>
          <span class="error-msg" id="error-caller"></span>
        </div>

        <div class="form-section">
          <h3>Zvanja</h3>
          <div class="calls-inputs" id="calls-inputs"></div>
        </div>

        <div class="form-section">
          <h3>Bodovi igre</h3>
          <div class="player-inputs" id="points-inputs"></div>
          <div class="points-sum-indicator" id="points-sum">Zbroj: 0 / 162</div>
          <div class="pass-fail-note" id="pass-fail-note"></div>
          <span class="error-msg" id="error-points"></span>
        </div>

        <button type="submit" class="btn btn-primary btn-large">Spremi rundu</button>
      </form>
    </div>
  </div>

  <!-- ===== MODAL: Potvrda ===== -->
  <div id="confirm-modal" class="modal-overlay">
    <div class="modal-card confirm-card">
      <p id="confirm-message">Jeste li sigurni?</p>
      <div class="confirm-actions">
        <button id="confirm-cancel-btn" class="btn btn-secondary" type="button">Odustani</button>
        <button id="confirm-ok-btn" class="btn btn-danger" type="button">Potvrdi</button>
      </div>
    </div>
  </div>

  <!-- ===== Obavijesti (toast) ===== -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

</div>
<script src="script.js"></script>
</body>
</html>
